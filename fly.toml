# fly.toml app configuration file generated for votablit on 2026-06-13T19:53:28+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'votablit'
primary_region = 'sjc'

[build]

[deploy]
  strategy = 'immediate'

[env]
  DATABASE_PATH = '/data/leaderboard.db'

[[mounts]]
  source = 'leaderboard_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
